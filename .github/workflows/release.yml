name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify macOS signing secrets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for name in MACOS_CERTIFICATE MACOS_CERTIFICATE_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name — see documentation/MACOS_SIGNING.md"
              exit 1
            fi
          done

      - name: Import Apple Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: bash scripts/import-macos-cert.sh

      - run: npm ci

      - name: Build, sign, and notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac:ci

      - name: Stage macOS release files
        run: |
          mkdir -p staged
          find release -maxdepth 1 -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.yml' -o \
            -name '*.blockmap' \
          \) -exec cp {} staged/ \;
          ls -la staged/

      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: staged/*
          if-no-files-found: error

      - name: Clean up signing keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run dist:win:ci

      - name: Stage Windows release files
        shell: bash
        run: |
          mkdir -p staged
          find release -maxdepth 1 -type f \( \
            -name '*.exe' -o \
            -name '*.yml' -o \
            -name '*.blockmap' \
          \) -exec cp {} staged/ \;
          ls -la staged/

      - uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: staged/*
          if-no-files-found: error

  publish:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge release assets
        run: |
          mkdir -p release
          cp artifacts/release-mac/* release/
          cp artifacts/release-win/* release/
          # GitHub renames spaces to dots in asset URLs; yml references hyphenated names.
          for f in release/*; do
            base=$(basename "$f")
            normalized=$(echo "$base" | tr ' ' '-')
            if [ "$base" != "$normalized" ]; then
              mv "release/$base" "release/$normalized"
            fi
          done
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
